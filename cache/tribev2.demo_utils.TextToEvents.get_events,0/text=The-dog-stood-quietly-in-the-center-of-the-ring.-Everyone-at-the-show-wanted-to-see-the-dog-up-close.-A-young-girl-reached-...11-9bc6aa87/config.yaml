text: The dog stood quietly in the center of the ring. Everyone at the show wanted
  to see the dog up close. A young girl reached out to touch the dog. The judge walked
  slowly around the dog and made some notes. Photographers leaned in to capture the
  dog in good light. The owner gently brushed the dog before the next round. People
  in the crowd pointed at the dog and smiled. The dog turned toward the sound of the
  applause. After the show, the dog rested quietly in the shade. Many visitors agreed
  the dog was the finest one there.
