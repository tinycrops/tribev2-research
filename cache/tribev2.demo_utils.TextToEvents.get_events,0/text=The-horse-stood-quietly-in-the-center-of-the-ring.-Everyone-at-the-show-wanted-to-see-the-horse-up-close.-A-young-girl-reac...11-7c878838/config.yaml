text: The horse stood quietly in the center of the ring. Everyone at the show wanted
  to see the horse up close. A young girl reached out to touch the horse. The judge
  walked slowly around the horse and made some notes. Photographers leaned in to capture
  the horse in good light. The owner gently brushed the horse before the next round.
  People in the crowd pointed at the horse and smiled. The horse turned toward the
  sound of the applause. After the show, the horse rested quietly in the shade. Many
  visitors agreed the horse was the finest one there.
