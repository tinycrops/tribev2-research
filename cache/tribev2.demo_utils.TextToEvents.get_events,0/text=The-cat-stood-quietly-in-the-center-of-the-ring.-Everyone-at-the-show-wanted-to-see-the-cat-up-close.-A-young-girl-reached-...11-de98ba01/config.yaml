text: The cat stood quietly in the center of the ring. Everyone at the show wanted
  to see the cat up close. A young girl reached out to touch the cat. The judge walked
  slowly around the cat and made some notes. Photographers leaned in to capture the
  cat in good light. The owner gently brushed the cat before the next round. People
  in the crowd pointed at the cat and smiled. The cat turned toward the sound of the
  applause. After the show, the cat rested quietly in the shade. Many visitors agreed
  the cat was the finest one there.
